<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sourcebound — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #0f0f10;
      color: #f4f4f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 380px;
      background: #18181b;
      border: 1px solid #2a2a2e;
      border-radius: 16px;
      padding: 36px 32px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-title {
      font-size: 22px;
      font-weight: 700;
      color: #f4f4f5;
      margin-bottom: 4px;
    }

    .logo-sub {
      font-size: 13px;
      color: #71717a;
    }

    .form-title {
      font-size: 16px;
      font-weight: 600;
      color: #f4f4f5;
      margin-bottom: 6px;
    }

    .form-sub {
      font-size: 13px;
      color: #71717a;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 9px 12px;
      background: #0f0f10;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #f4f4f5;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .field input::placeholder { color: #52525b; }

    .submit-btn {
      width: 100%;
      padding: 10px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    .submit-btn:hover { background: #818cf8; }
    .submit-btn:disabled { background: #3f3f46; cursor: not-allowed; }

    .toggle-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #71717a;
    }

    .toggle-link a {
      color: #818cf8;
      text-decoration: none;
      cursor: pointer;
    }

    .toggle-link a:hover { text-decoration: underline; }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 14px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 16px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #2a2a2e;
    }

    .divider-text {
      font-size: 12px;
      color: #52525b;
      white-space: nowrap;
    }

    .google-btn {
      width: 100%;
      padding: 10px;
      background: #1c1c1f;
      color: #f4f4f5;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, border-color 0.15s;
    }

    .google-btn:hover { background: #27272a; border-color: #52525b; }
    .google-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .google-icon { width: 18px; height: 18px; }

    /* Invite code toggle */
    .invite-toggle {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: #71717a;
    }

    .invite-toggle a {
      color: #818cf8;
      text-decoration: none;
      cursor: pointer;
    }

    .invite-toggle a:hover { text-decoration: underline; }

    #invite-code-section { display: none; margin-top: 14px; }

    .step-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #6366f1;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
      padding: 3px 10px;
      margin-bottom: 14px;
    }

    #register-form { display: none; }
    #onboarding-form { display: none; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-title">Sourcebound</div>
    <div class="logo-sub">Your intelligent knowledge assistant</div>
  </div>

  <!-- LOGIN FORM -->
  <div id="login-form">
    <div class="form-title">Sign in to your account</div>
    <div class="error-msg" id="login-error"></div>
    <div class="field">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" />
    </div>
    <button class="submit-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="toggle-link">
      Don't have an account? <a onclick="showRegister()">Register</a>
    </div>

    <div class="divider" id="login-google-divider" style="display:none;">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>
    <button class="google-btn" id="login-google-btn" style="display:none;" onclick="doGoogleLogin()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <!-- REGISTER FORM -->
  <div id="register-form">
    <div class="form-title">Create an account</div>
    <div class="error-msg" id="register-error"></div>
    <div class="field">
      <label for="reg-name">Full Name</label>
      <input type="text" id="reg-name" placeholder="Your name" autocomplete="name" />
    </div>
    <div class="field">
      <label for="reg-email">Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" placeholder="Create a password" autocomplete="new-password" />
    </div>
    <div class="field">
      <label for="reg-confirm">Confirm Password</label>
      <input type="password" id="reg-confirm" placeholder="Repeat password" autocomplete="new-password" />
    </div>
    <button class="submit-btn" id="register-btn" onclick="doRegister()">Create Account</button>
    <div class="toggle-link">
      Already have an account? <a onclick="showLogin()">Sign in</a>
    </div>

    <div class="divider" id="register-google-divider" style="display:none;">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>
    <button class="google-btn" id="register-google-btn" style="display:none;" onclick="doGoogleLogin()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <!-- ONBOARDING STEP 2: SET UP WORKSPACE -->
  <div id="onboarding-form">
    <div class="step-badge">Step 2 of 2</div>
    <div class="form-title">Set up your workspace</div>
    <div class="form-sub">Create a workspace for your team or join an existing one.</div>
    <div class="error-msg" id="onboarding-error"></div>

    <div class="field">
      <label for="org-name">Workspace Name</label>
      <input type="text" id="org-name" placeholder="Acme Corp" autocomplete="organization" />
    </div>
    <button class="submit-btn" id="create-org-btn" onclick="doCreateOrg()">Create Workspace</button>
    <button class="submit-btn" id="skip-org-btn" onclick="skipWorkspaceSetup()" style="background:#27272a;border:1px solid #3f3f46;margin-top:10px;">
      Skip for now
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <div class="invite-toggle">
      Have an invite code?
      <a onclick="toggleInviteCode()">Enter it here</a>
    </div>

    <div id="invite-code-section">
      <div class="field" style="margin-top:12px;">
        <label for="invite-token">Invite Code</label>
        <input type="text" id="invite-token" placeholder="Paste your invite code" />
      </div>
      <button class="submit-btn" id="accept-invite-btn" onclick="doAcceptInvite()" style="background:#27272a;border:1px solid #3f3f46;">
        Join Workspace
      </button>
    </div>
  </div>
</div>

<script>
  var BASE = window.location.origin;

  // Check for pending onboarding (user logged in but no tenant yet)
  (function() {
    var token = localStorage.getItem("crag_token");
    if (token) {
      var user = JSON.parse(localStorage.getItem("crag_user") || "{}");
      if (!user.tenant_id) {
        // Logged in but no tenant — show onboarding
        showOnboarding();
        return;
      }
      window.location.replace("/");
      return;
    }

    // Handle Google OAuth token in URL hash
    var hash = new URLSearchParams(window.location.hash.slice(1));
    var oauthToken = hash.get("token");
    if (oauthToken) {
      localStorage.setItem("crag_token", oauthToken);
      fetch(BASE + "/auth/me", { headers: { "Authorization": "Bearer " + oauthToken } })
        .then(function(r) { return r.json(); })
        .then(function(u) {
          var userData = {
            username: u.username,
            display_name: u.display_name || u.username,
            role: u.role,
            user_id: u.user_id || u.sub,
            email: u.email,
            tenant_id: u.tenant_id || null,
            tenant_name: u.tenant_name || null,
          };
          localStorage.setItem("crag_user", JSON.stringify(userData));
          if (!userData.tenant_id) {
            showOnboarding();
          } else {
            window.location.replace("/");
          }
        })
        .catch(function() { window.location.replace("/"); });
    }
  })();

  // Probe Google OAuth availability
  (function() {
    fetch(BASE + "/auth/google")
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d.error) {
          ["login-google-divider", "login-google-btn",
           "register-google-divider", "register-google-btn"].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.style.display = "";
          });
          document.getElementById("login-google-divider").style.display = "flex";
          document.getElementById("register-google-divider").style.display = "flex";
        }
      })
      .catch(function() {});
  })();

  function showLogin() {
    document.getElementById("login-form").style.display = "block";
    document.getElementById("register-form").style.display = "none";
    document.getElementById("onboarding-form").style.display = "none";
    clearErrors();
  }

  function showRegister() {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("register-form").style.display = "block";
    document.getElementById("onboarding-form").style.display = "none";
    clearErrors();
  }

  function showOnboarding() {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("register-form").style.display = "none";
    document.getElementById("onboarding-form").style.display = "block";
    clearErrors();
  }

  function toggleInviteCode() {
    var sec = document.getElementById("invite-code-section");
    sec.style.display = sec.style.display === "none" ? "block" : "none";
  }

  function clearErrors() {
    ["login-error", "register-error", "onboarding-error"].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) { el.classList.remove("visible"); el.textContent = ""; }
    });
  }

  function showError(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add("visible");
  }

  function _storeUser(data, extraFields) {
    var user = Object.assign({
      username: data.username,
      display_name: data.display_name || data.username,
      role: data.role,
      user_id: data.user_id,
      email: data.email || null,
      tenant_id: data.tenant_id || null,
      tenant_name: data.tenant_name || null,
    }, extraFields || {});
    localStorage.setItem("crag_user", JSON.stringify(user));
  }

  async function doLogin() {
    clearErrors();
    var email = document.getElementById("login-email").value.trim();
    var password = document.getElementById("login-password").value;
    if (!email || !password) {
      showError("login-error", "Please enter email and password.");
      return;
    }
    var btn = document.getElementById("login-btn");
    btn.disabled = true;
    btn.textContent = "Signing in...";
    try {
      var res = await fetch(BASE + "/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: password }),
      });
      var data = await res.json();
      if (!res.ok) {
        showError("login-error", data.detail || "Login failed.");
        return;
      }
      localStorage.setItem("crag_token", data.token);
      _storeUser(data, { email: email });
      if (!data.tenant_id) {
        showOnboarding();
      } else {
        window.location.replace("/");
      }
    } catch(e) {
      showError("login-error", "Network error. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  }

  async function doRegister() {
    clearErrors();
    var name = document.getElementById("reg-name").value.trim();
    var email = document.getElementById("reg-email").value.trim();
    var password = document.getElementById("reg-password").value;
    var confirm = document.getElementById("reg-confirm").value;
    if (!name || !email || !password) {
      showError("register-error", "Name, email, and password are required.");
      return;
    }
    if (password !== confirm) {
      showError("register-error", "Passwords do not match.");
      return;
    }
    var btn = document.getElementById("register-btn");
    btn.disabled = true;
    btn.textContent = "Creating account...";
    try {
      var res = await fetch(BASE + "/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ display_name: name, email: email, password: password }),
      });
      var data = await res.json();
      if (!res.ok) {
        showError("register-error", data.detail || "Registration failed.");
        return;
      }
      localStorage.setItem("crag_token", data.token);
      _storeUser(data, { email: email });
      if (data.tenant_id) {
        window.location.replace("/");
      } else {
        showOnboarding();
      }
    } catch(e) {
      showError("register-error", "Network error. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Create Account";
    }
  }

  async function doCreateOrg() {
    clearErrors();
    var orgName = document.getElementById("org-name").value.trim();
    if (!orgName) {
      showError("onboarding-error", "Please enter a workspace name.");
      return;
    }
    var token = localStorage.getItem("crag_token");
    if (!token) {
      showError("onboarding-error", "Session expired. Please sign in again.");
      showLogin();
      return;
    }
    var btn = document.getElementById("create-org-btn");
    btn.disabled = true;
    btn.textContent = "Creating...";
    try {
      var res = await fetch(BASE + "/auth/create-org", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ org_name: orgName }),
      });
      var data = await res.json();
      if (!res.ok) {
        showError("onboarding-error", data.detail || "Failed to create workspace.");
        return;
      }
      // Update stored token and user
      localStorage.setItem("crag_token", data.token);
      var user = JSON.parse(localStorage.getItem("crag_user") || "{}");
      user.role = data.role;
      user.tenant_id = data.tenant_id;
      user.tenant_name = data.tenant_name;
      localStorage.setItem("crag_user", JSON.stringify(user));
      window.location.replace("/");
    } catch(e) {
      showError("onboarding-error", "Network error. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Create Workspace";
    }
  }

  async function skipWorkspaceSetup() {
    var user = JSON.parse(localStorage.getItem("crag_user") || "{}");
    var fallbackName = (user.display_name || user.username || "My").split("@")[0] + "'s Workspace";
    document.getElementById("org-name").value = fallbackName;
    await doCreateOrg();
  }

  async function doAcceptInvite() {
    clearErrors();
    var inviteToken = document.getElementById("invite-token").value.trim();
    if (!inviteToken) {
      showError("onboarding-error", "Please paste your invite code.");
      return;
    }
    var token = localStorage.getItem("crag_token");
    if (!token) {
      showError("onboarding-error", "Session expired. Please sign in again.");
      showLogin();
      return;
    }
    var btn = document.getElementById("accept-invite-btn");
    btn.disabled = true;
    btn.textContent = "Joining...";
    try {
      var res = await fetch(BASE + "/auth/accept-invite", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ token: inviteToken }),
      });
      var data = await res.json();
      if (!res.ok) {
        showError("onboarding-error", data.detail || "Invalid or expired invite.");
        return;
      }
      localStorage.setItem("crag_token", data.token);
      var user = JSON.parse(localStorage.getItem("crag_user") || "{}");
      user.role = data.role;
      user.tenant_name = data.tenant_name;
      localStorage.setItem("crag_user", JSON.stringify(user));
      window.location.replace("/");
    } catch(e) {
      showError("onboarding-error", "Network error. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Join Workspace";
    }
  }

  function doGoogleLogin() {
    window.location.href = BASE + "/auth/google";
  }

  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      var loginVisible = document.getElementById("login-form").style.display !== "none";
      var registerVisible = document.getElementById("register-form").style.display !== "none";
      var onboardingVisible = document.getElementById("onboarding-form").style.display !== "none";
      if (loginVisible) doLogin();
      else if (registerVisible) doRegister();
      else if (onboardingVisible) doCreateOrg();
    }
  });
</script>
</body>
</html>
